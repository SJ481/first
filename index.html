      // 立即执行日志过滤脚本，确保在所有其他脚本执行前拦截
      (function() {
        // 保存原始console方法
        const originalConsole = {
          log: console.log.bind(console),
          error: console.error.bind(console),
          warn: console.warn.bind(console),
          info: console.info.bind(console),
          debug: console.debug.bind(console),
          table: console.table.bind(console),
          trace: console.trace.bind(console),
          dir: console.dir.bind(console),
          time: console.time.bind(console),
          timeEnd: console.timeEnd.bind(console),
          assert: console.assert.bind(console),
          group: console.group.bind(console),
          groupEnd: console.groupEnd.bind(console),
          groupCollapsed: console.groupCollapsed.bind(console)
        };
        
        // 定义要拦截的内存地址模式 - 支持1个或更多内存地址，修复语法错误并提高可靠性
        const MEMORY_ADDR_PATTERN = /0x[0-9a-fA-F]{8,}/;
        
        // 通用过滤函数 - 优化了参数处理逻辑
        function filterConsoleMethod(originalMethod) {
          return function(...args) {
            // 检查每个参数是否匹配内存地址模式
            let containsMemoryAddr = false;
            for (const arg of args) {
              const argStr = String(arg);
              if (MEMORY_ADDR_PATTERN.test(argStr)) {
                containsMemoryAddr = true;
                break;
              }
            }
            // 只有不包含内存地址的日志才会输出
            if (!containsMemoryAddr) {
              originalMethod.apply(console, args);
            }
          };
        }
        
        // 创建所有过滤后的console方法
        const filteredConsole = {
          log: filterConsoleMethod(originalConsole.log),
          error: filterConsoleMethod(originalConsole.error), // 错误日志也进行过滤，去除内存地址
          warn: filterConsoleMethod(originalConsole.warn),
          info: filterConsoleMethod(originalConsole.info),
          debug: filterConsoleMethod(originalConsole.debug),
          table: filterConsoleMethod(originalConsole.table),
          trace: filterConsoleMethod(originalConsole.trace),
          dir: filterConsoleMethod(originalConsole.dir),
          time: filterConsoleMethod(originalConsole.time),
          timeEnd: filterConsoleMethod(originalConsole.timeEnd),
          assert: filterConsoleMethod(originalConsole.assert),
          group: filterConsoleMethod(originalConsole.group),
          groupEnd: filterConsoleMethod(originalConsole.groupEnd),
          groupCollapsed: filterConsoleMethod(originalConsole.groupCollapsed)
        };
        
        // 重写所有console方法，并添加保护机制防止被覆盖
        Object.keys(filteredConsole).forEach(methodName => {
          Object.defineProperty(console, methodName, {
            value: filteredConsole[methodName],
            writable: false,  // 防止被重写
            configurable: false  // 防止被删除或修改属性描述符
          });
        });
        
        // 测试过滤功能
